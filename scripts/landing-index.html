  <script>!function(){try{var t=localStorage.getItem("guide-theme");if("light"!==t&&"dark"!==t)t=window.matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light";document.documentElement.setAttribute("data-theme",t)}catch(e){}}();</script>
  <style>
    :root,
    [data-theme="light"] {
      color-scheme: light;
      --bg: #f4f6f9;
      --surface: #ffffff;
      --border: #dde3ec;
      --text: #1a2332;
      --muted: #5c6b82;
      --accent: #4a7ae0;
      --accent-hover: #3d6ad4;
      --accent-muted: rgba(74, 122, 224, 0.1);
      --shadow: 0 8px 24px rgba(15, 20, 25, 0.1);
    }

    [data-theme="dark"] {
      color-scheme: dark;
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b8def;
      --accent-hover: #7aa3f5;
      --accent-muted: rgba(91, 141, 239, 0.15);
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        color-scheme: light;
        --bg: #f4f6f9;
        --surface: #ffffff;
        --border: #dde3ec;
        --text: #1a2332;
        --muted: #5c6b82;
        --accent: #4a7ae0;
        --accent-hover: #3d6ad4;
        --accent-muted: rgba(74, 122, 224, 0.1);
        --shadow: 0 8px 24px rgba(15, 20, 25, 0.1);
      }
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        color-scheme: dark;
        --bg: #0f1419;
        --surface: #1a2332;
        --border: #2d3a4f;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --accent: #5b8def;
        --accent-hover: #7aa3f5;
        --accent-muted: rgba(91, 141, 239, 0.15);
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    .page-header {
      position: relative;
      margin-bottom: 3rem;
      text-align: center;
    }

    .theme-toggle {
      position: absolute;
      top: 0;
      right: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      padding: 0;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease;
    }

    .theme-toggle:hover {
      border-color: var(--accent);
      color: var(--accent-hover);
    }

    .theme-toggle__icon--sun {
      display: none;
    }

    [data-theme="dark"] .theme-toggle__icon--sun {
      display: block;
    }

    [data-theme="dark"] .theme-toggle__icon--moon {
      display: none;
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) .theme-toggle__icon--sun {
        display: block;
      }

      :root:not([data-theme="light"]) .theme-toggle__icon--moon {
        display: none;
      }
    }

    .page-header h1 {
      display: inline-flex;
      align-items: flex-end;
      justify-content: center;
      gap: 0.55rem;
      margin: 0 auto 0.75rem;
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .brand-logo-wrap {
      display: inline-flex;
      align-items: flex-start;
      height: 2.35rem;
      overflow: hidden;
      flex-shrink: 0;
      border-radius: 4px;
    }

    .brand-logo-wrap img {
      display: block;
      height: 3.35rem;
      width: auto;
    }

    .brand-text {
      padding-bottom: 0.1rem;
    }

    .page-header p {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s, background-color 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }

    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: var(--accent-hover);
    }

    .card p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 999px;
      background: var(--accent-muted);
      color: var(--accent-hover);
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
    }
  </style>

<body>

    <footer>
      <p>guide.uxkm.io</p>
    </footer>

  <script>
    (function () {
      var STORAGE_KEY = 'guide-theme';
      var btn = document.getElementById('root-theme-btn');

      function getSystemTheme() {
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      function getStoredTheme() {
        try {
          var stored = localStorage.getItem(STORAGE_KEY);
          return stored === 'light' || stored === 'dark' ? stored : null;
        } catch (e) {
          return null;
        }
      }

      function getActiveTheme() {
        return document.documentElement.getAttribute('data-theme') || getSystemTheme();
      }

      function applyTheme(theme, persist) {
        document.documentElement.setAttribute('data-theme', theme);
        if (persist) {
          try { localStorage.setItem(STORAGE_KEY, theme); } catch (e) {}
        }
        updateLabel();
      }

      function updateLabel() {
        var isDark = getActiveTheme() === 'dark';
        btn.setAttribute('aria-label', isDark ? '라이트 모드로 전환' : '다크 모드로 전환');
      }

      btn.addEventListener('click', function () {
        applyTheme(getActiveTheme() === 'dark' ? 'light' : 'dark', true);
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
        if (!getStoredTheme()) {
          applyTheme(getSystemTheme(), false);
        }
      });

      updateLabel();
    })();
  </script>
