<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Demo | UXKM Guide</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b8def;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    .back {
      display: inline-block;
      margin-bottom: 2rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .back:hover { color: var(--accent); }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .demo-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
    }

    .demo-box p { margin-bottom: 1.25rem; }

    button {
      padding: 0.6rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover { opacity: 0.9; }

    #counter {
      display: inline-block;
      margin-top: 1rem;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="../index.html">← 메인으로</a>

    <h1>HTML Demo</h1>
    <p class="subtitle">순수 HTML, CSS, JavaScript 데모</p>

    <div class="demo-box">
      <p>버튼을 클릭하면 카운터가 증가합니다.</p>
      <button type="button" id="btn">클릭</button>
      <div id="counter">0</div>
    </div>
  </div>

  <script>
    let count = 0;
    const btn = document.getElementById('btn');
    const counter = document.getElementById('counter');

    btn.addEventListener('click', () => {
      count += 1;
      counter.textContent = count;
    });
  </script>
</body>
</html>
