<script>
  (function () {
    var params = new URLSearchParams(window.location.search);
    var path = params.get('path');
    var isMalformed =
      !path ||
      path === '/docs' ||
      path === 'docs' ||
      path.indexOf('/?path=') === 0;

    if (isMalformed) {
      params.set('path', '/docs/intro--docs');
      window.location.replace(
        window.location.pathname + '?' + params.toString() + window.location.hash,
      );
    }
  })();
</script>
