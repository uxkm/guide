<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UXKM Guide</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #5b8def;
      --accent-hover: #7aa3f5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    header {
      margin-bottom: 3rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    header p {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      display: block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
    }

    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: var(--accent-hover);
    }

    .card p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .badge {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.25rem 0.6rem;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 999px;
      background: rgba(91, 141, 239, 0.15);
      color: var(--accent-hover);
    }

    footer {
      margin-top: 4rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>UXKM Guide</h1>
      <p>프레임워크별 데모 페이지 모음</p>
    </header>

    <nav class="grid" aria-label="데모 목록">
      <a class="card" href="./html/index.html">
        <h2>HTML</h2>
        <p>순수 HTML/CSS/JS로 구성된 데모 페이지</p>
        <span class="badge">Vanilla</span>
      </a>

      <a class="card" href="./react/index.html">
        <h2>React</h2>
        <p>React 기반 컴포넌트 데모 페이지</p>
        <span class="badge">React</span>
      </a>

      <a class="card" href="./vue/index.html">
        <h2>Vue</h2>
        <p>Vue 기반 컴포넌트 데모 페이지</p>
        <span class="badge">Vue</span>
      </a>
    </nav>

    <footer>
      <p>guide.uxkm.io</p>
    </footer>
  </div>
</body>
</html>
